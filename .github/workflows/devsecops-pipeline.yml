name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devsecops-lab-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ============================================================
  # GATE 1: Secret Scanning
  # Catches API keys, passwords, tokens committed to the repo
  # Maps to: NIST 800-53 IA-5, SC-28
  # ============================================================
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GATE 2: Static Application Security Testing (SAST)
  # Catches insecure code patterns before they're ever deployed
  # Maps to: NIST 800-53 SA-11, SI-3
  # ============================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/flask
            p/owasp-top-ten
            p/command-injection
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true  # We'll show findings but not block yet

      - name: Run Semgrep (CI mode - will fail on findings)
        run: |
          pip install semgrep
          semgrep --config=p/python \
                  --config=p/command-injection \
                  --config=p/owasp-top-ten \
                  app/ \
                  --json \
                  --output=semgrep-results.json || true
          
          # Display findings
          cat semgrep-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', [])
          if results:
              print(f'⚠️  Semgrep found {len(results)} finding(s):')
              for r in results:
                  print(f'  [{r[\"extra\"][\"severity\"]}] {r[\"check_id\"]}')
                  print(f'    File: {r[\"path\"]}:{r[\"start\"][\"line\"]}')
                  print(f'    Message: {r[\"extra\"][\"message\"]}')
                  print()
          else:
              print('✅ No findings')
          "

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ============================================================
  # GATE 3: Build + Container Image Scanning
  # Catches CVEs in base images and dependencies
  # Maps to: NIST 800-53 SI-2, RA-5, CM-7
  # ============================================================
  container-security:
    name: Container Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./app/

      - name: Run Trivy - CRITICAL/HIGH CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'        # Pipeline FAILS if CRITICAL/HIGH CVEs found
          ignore-unfixed: true  # Only fail on CVEs that have a fix available

      - name: Run Trivy - Full report (all severities)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'        # Don't block on this one, just collect

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-results
          path: trivy-results.json

  # ============================================================
  # GATE 4: IaC Security Scanning
  # Catches cloud misconfigurations before they're ever applied
  # Maps to: NIST 800-53 CM-2, CM-6, SC-7
  # ============================================================
  iac-scanning:
    name: IaC Scanning (Checkov)
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,json
          output_file_path: console,checkov-results.json
          soft_fail: true       # Will change to false once Terraform is built out

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: cli,json
          output_file_path: console,checkov-k8s-results.json
          soft_fail: true

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: |
            checkov-results.json
            checkov-k8s-results.json

  # ============================================================
  # SUMMARY: Pipeline Status
  # ============================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [secret-scanning, sast, container-security, iac-scanning]
    if: always()
    steps:
      - name: Check gate results
        run: |
          echo "================================================"
          echo "  DevSecOps Pipeline Summary"
          echo "================================================"
          echo "Secret Scanning:    ${{ needs.secret-scanning.result }}"
          echo "SAST:               ${{ needs.sast.result }}"
          echo "Container Security: ${{ needs.container-security.result }}"
          echo "IaC Scanning:       ${{ needs.iac-scanning.result }}"
          echo "================================================"
          
          # Fail the summary if any hard gates failed
          if [ "${{ needs.secret-scanning.result }}" == "failure" ] || \
             [ "${{ needs.container-security.result }}" == "failure" ]; then
            echo "❌ HARD GATE FAILED - Deployment blocked"
            exit 1
          else
            echo "✅ Hard gates passed"
          fi